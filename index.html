    const exportBtn = document.getElementById('exportExcelBtn');

    // 渲染表格
    function renderTable() {
        let html = '';
        records.forEach(record => {
            html += `<tr>
                <td><span class="badge-campus">${escapeHtml(record.campus)}</span></td>
                <td><strong>${escapeHtml(record.time)}</strong></td>
                <td>${escapeHtml(record.className)}</td>
                <td>${escapeHtml(record.count)}</td>
                <td>${escapeHtml(record.teacher)}</td>
                <td>${escapeHtml(record.location)}</td>
                <td><button class="delete-btn" data-id="${record.id}">✕</button></td>
            </tr>`;
        });
        tbody.innerHTML = html;
        recordSpan.innerText = `📋 当前记录数：${records.length} 条`;

        // 绑定删除事件
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.getAttribute('data-id');
                records = records.filter(r => r.id !== id);
                renderTable();
            });
        });
    }

    // 简单转义
    function escapeHtml(unsafe) {
        if (unsafe === undefined || unsafe === null) return '';
        return String(unsafe)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

        const campus = campusSelect.value.trim();
        const time = timeInput.value.trim();
        const className = classInput.value.trim();
        const teacher = teacherInput.value.trim();
        const count = countInput.value.trim();
        const location = locationInput.value.trim();

        if (!campus || !time || !className || !teacher || !count || !location) {
            alert('请完整填写所有字段（人数可填“待定”）');
            return;
        }

        const newRecord = {
            id: createId(),
            campus,
            time,
            className,
            count,
            teacher,
            location
        };
        records.push(newRecord);
        renderTable();
        clearForm();      // 可选：添加后清空
    }

    // 导出为CSV (兼容Excel)
    function exportToExcel() {
        if (records.length === 0) {
            alert('暂无数据可导出');
            return;
        }

        // 定义标题 (与表头对应)
        const headers = ['校区', '时间', '班级/课程', '人数', '姓名', '上课地点'];
        // 准备数据二维数组
        const dataRows = records.map(r => [
            r.campus,
            r.time,
            r.className,
            r.count,
            r.teacher,
            r.location
        ]);

        // 构建CSV内容 (BOM用于UTF-8中文)
        let csvContent = "\uFEFF" + headers.join(',') + '\n';
        dataRows.forEach(row => {
            const escapedRow = row.map(cell => {
                // 如果包含逗号、换行或双引号，用双引号包裹
                if (typeof cell === 'string' && (cell.includes(',') || cell.includes('"') || cell.includes('\n'))) {
                    return '"' + cell.replace(/"/g, '""') + '"';
                }
                return cell;
            }).join(',');
            csvContent += escapedRow + '\n';
        });

        // 下载
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', '训练时间表_杨汛桥拱宸桥.xls'); // .xls 方便直接打开
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // 初始化渲染
    renderTable();

    // 事件绑定
    addBtn.addEventListener('click', addRecord);
    clearFormBtn.addEventListener('click', clearForm);
    exportBtn.addEventListener('click', exportToExcel);

    // 可选的回车快速添加 (监听表单)
    [timeInput, classInput, teacherInput, countInput, locationInput].forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addRecord();
            }
        });
    });

})();
</script>
</body>
</html>
